name: continuim

services:
  procurement:
    build: .
    command: npm run start:procurement
    env_file: .env.local
    environment:
      AUTH_MODE: development
      PROCUREMENT_HOST: 0.0.0.0
      SQLITE_PATH: /app/data/continuim.db
    expose:
      - "4001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4001/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 3s
      timeout: 2s
      retries: 10

  control-plane:
    build: .
    command: npm run start:control
    env_file: .env.local
    environment:
      AUTH_MODE: development
      CONTROL_PLANE_HOST: 0.0.0.0
      PROCUREMENT_URL: http://procurement:4001
      SQLITE_PATH: /app/data/continuim.db
    ports:
      - "4000:4000"
    volumes:
      - continuim-data:/app/data
    depends_on:
      procurement:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 3s
      timeout: 2s
      retries: 10

  dashboard:
    build: .
    command: npm run start:web
    env_file: .env.local
    environment:
      CONTROL_PLANE_INTERNAL_URL: http://control-plane:4000
    ports:
      - "3000:3000"
    depends_on:
      control-plane:
        condition: service_healthy

  # --- Prize-mode ingress (documentation; NOT started by the default dev `up`) ---
  # In prize mode the agent reaches procurement ONLY through a Pomerium proxy. Pomerium
  # Zero is a hosted control plane + self-hosted data plane: run the proxy here, in the
  # same network as procurement, bootstrapped with the cluster token. It reaches
  # http://procurement:4001 directly — no separate tunnel/connector is needed, and
  # procurement keeps `expose:` only (no published port). See docs/integrations/POMERIUM.md.
  # For B5: uncomment, set POMERIUM_ZERO_TOKEN, and set AUTH_MODE=pomerium on procurement.
  #
  # pomerium:
  #   image: pomerium/pomerium:latest
  #   environment:
  #     POMERIUM_ZERO_TOKEN: ${POMERIUM_ZERO_TOKEN:?set the Pomerium Zero cluster token}
  #   ports:
  #     - "443:443"
  #   depends_on:
  #     procurement:
  #       condition: service_healthy

volumes:
  continuim-data:
