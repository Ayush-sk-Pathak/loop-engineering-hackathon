/* ---------- nav ---------- */
function renderNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  let lastGroup=null;
  const groupName={Operations:"Operations","Installed apps":"Installed apps",Operations2:" "};
  NAV.forEach(n=>{
    if(n.group!==lastGroup){ const lbl=document.createElement('div'); lbl.className='nav-label'; lbl.textContent=groupName[n.group]; nav.appendChild(lbl); lastGroup=n.group; }
    const b=document.createElement('button'); b.className='nav-item'+(state.section===n.id?' active':'');
    const badge = n.badge? '<span class="nav-badge">'+n.badge+'</span>' : (n.id==='inventory'?'<span class="nav-badge crit">1</span>':'');
    b.innerHTML=n.icon+' <span>'+n.label+'</span>'+badge;
    b.onclick=()=>{ state.section=n.id; renderNav(); renderView(); };
    nav.appendChild(b);
  });
  const foot=document.createElement('div'); foot.className='nav-foot'; foot.innerHTML='<span class="pulse"></span> Agent connected'; nav.appendChild(foot);
}

/* ---------- helpers ---------- */
function head(title,sub,right){return '<div class="section-head"><div class="st"><h2>'+title+'</h2><div class="sub">'+sub+'</div></div>'+(right?'<div class="sh-right">'+right+'</div>':'')+'</div>';}
function pill(cls,txt){return '<span class="pill '+cls+'"><span class="dotp"></span>'+txt+'</span>';}
function vendorCard(v,revealed){
  const cls=revealed?(v.verified?'reveal-ok':'reveal-bad'):'';
  const pillTxt=revealed?(v.verified?'Verified':'Fraud flagged'):'Unchecked';
  const sig=v.sig.map(x=>'<div class="sig"><span class="l">'+x[0]+'</span><span class="v'+(revealed?' '+x[2]:'')+'">'+x[1]+'</span></div>').join('');
  return '<div class="vendor '+cls+'" data-verified="'+v.verified+'"><div class="vh"><span class="name">'+v.name+'</span><span class="vpill">'+pillTxt+'</span></div><div class="vnote">'+v.note+'</div><div class="vsig">'+sig+'</div><div class="vprice"><span class="pl">Quote</span><span class="p">'+v.price+'</span><span class="tag deny-tag">Payment denied</span><span class="tag pick-tag">Order placed</span></div></div>';
}

    +'<div class="step" data-step="resolve"><div class="n">05 · RESOLVE</div><div class="s"><span class="tick"></span>Resolve</div><div class="d">Self-correct &amp; complete</div></div></div>'
    +'<div class="grid2"><div class="panel"><div class="panel-h">'+IC.vendors+' Backup vendors <span class="cnt">'+d.item+'</span></div><div class="vendors" id="vendors">'+vendorCard(d.vendors[0],false)+vendorCard(d.vendors[1],false)+'</div></div>'
    +'<div class="panel"><div class="panel-h">'+IC.activity+' Agent activity <span class="cnt">live trace</span></div><div class="log" id="log"></div></div></div>'
    +'<div class="metrics"><div class="metric hero"><div class="ml">Fraud blocked</div><div class="mv" id="mBlocked">$0</div><div class="mh">payment denied at policy layer</div></div>'
    +'<div class="metric okm"><div class="ml">'+d.secondL+'</div><div class="mv" id="mSecond">—</div><div class="mh">'+d.secondH+'</div></div>'
    +'<div class="metric"><div class="ml">Time to resolve</div><div class="mv" id="mTime">—</div><div class="mh">fully autonomous, no human step</div></div></div>';
  return html;
}

const VIEWS={dashboard:viewDashboard,inventory:viewInventory,procurement:viewProcurement,vendors:viewVendors,interceptor:viewInterceptor,reports:viewReports,settings:viewSettings};

function renderView(){
  clearTimers();
  const view=document.getElementById('view');
  view.innerHTML=VIEWS[state.section]();
  view.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{state.section=b.getAttribute('data-go');renderNav();renderView();});
  if(state.section==='interceptor'){ const rb=document.getElementById('replayBtn'); if(rb) rb.onclick=playLoop; playLoop(); }
}

/* ---------- animated loop ---------- */
function setStep(step,st){const e=document.querySelector('.step[data-step="'+step+'"]');if(e)e.setAttribute('data-state',st);}
function stepsBefore(step){const o=['detect','source','verify','guard','resolve'];o.slice(0,o.indexOf(step)).forEach(s=>{const e=document.querySelector('.step[data-step="'+s+'"]');if(e&&e.getAttribute('data-state')!=='guard')e.setAttribute('data-state','done');});}
function money(s){return parseInt(s.replace(/[^0-9]/g,''),10)||0;}
function countUp(node,target){if(RM){node.textContent='$'+target.toLocaleString();return;}const t0=performance.now();(function f(t){const p=Math.min(1,(t-t0)/700);node.textContent='$'+Math.round(target*(1-Math.pow(1-p,3))).toLocaleString();if(p<1)requestAnimationFrame(f);})(performance.now());}
function playLoop(){
  clearTimers();
  const d=D(); const log=document.getElementById('log'); if(!log)return; log.innerHTML='';
  document.querySelectorAll('.step').forEach(s=>s.removeAttribute('data-state'));
  const vc=document.getElementById('vendors'); if(vc) vc.innerHTML=vendorCard(d.vendors[0],false)+vendorCard(d.vendors[1],false);
  const mb=document.getElementById('mBlocked'), ms=document.getElementById('mSecond'), mt=document.getElementById('mTime');
  if(mb)mb.textContent='$0'; if(ms)ms.textContent='—'; if(mt)mt.textContent='—';
  d.trace.forEach((row,i)=>{
    timers.push(setTimeout(()=>{
      const lg=document.getElementById('log'); if(!lg)return;
      const [kind,src,msg,tag]=row;
      const ln=document.createElement('div'); ln.className='ln';
      ln.innerHTML='<span class="ts">'+new Date().toLocaleTimeString('en-GB')+'</span><span class="src '+kind+'">'+src+'</span><span class="msg">'+msg+'</span>';
      lg.appendChild(ln); requestAnimationFrame(()=>ln.classList.add('show')); lg.scrollTop=lg.scrollHeight;
      if(['detect','source','verify','guard','resolve'].includes(tag)){stepsBefore(tag);setStep(tag,tag==='guard'?'guard':'active');}
      if(tag==='reveal-ok'){const v=document.querySelector('.vendor[data-verified="true"]');if(v){v.classList.add('reveal-ok');v.querySelector('.vpill').textContent='Verified';v.querySelectorAll('.vsig .v').forEach((n,j)=>n.classList.add(d.vendors[0].sig[j][2]));}}
      if(tag==='reveal-bad'){const v=document.querySelector('.vendor[data-verified="false"]');if(v){v.classList.add('reveal-bad');v.querySelector('.vpill').textContent='Fraud flagged';v.querySelectorAll('.vsig .v').forEach((n,j)=>n.classList.add(d.vendors[1].sig[j][2]));}}
      if(tag==='deny'){const v=document.querySelector('.vendor[data-verified="false"]');if(v)v.classList.add('denied');}
      if(tag==='pick'){const v=document.querySelector('.vendor[data-verified="true"]');if(v)v.classList.add('picked');}
      if(tag==='done'){document.querySelectorAll('.step').forEach(s=>{if(s.getAttribute('data-state')==='active')s.setAttribute('data-state','done');});setStep('resolve','done');const b=document.getElementById('mBlocked');if(b)countUp(b,money(d.blocked));const s2=document.getElementById('mSecond');if(s2)s2.textContent=d.second;const t2=document.getElementById('mTime');if(t2)t2.textContent=d.time;}
    }, RM?0:i*520));
  });
}

/* ---------- workspace switch + theme ---------- */
function setWs(ws){state.ws=ws;document.getElementById('wsSock').classList.toggle('on',ws==='sock');document.getElementById('wsGpu').classList.toggle('on',ws==='gpu');renderView();}
document.getElementById('wsSock').onclick=()=>setWs('sock');
document.getElementById('wsGpu').onclick=()=>setWs('gpu');
document.getElementById('themeBtn').onclick=()=>{const r=document.documentElement;const now=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');r.setAttribute('data-theme',now==='dark'?'light':'dark');};

renderNav(); renderView();
</script>
