<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5b6470"/>
    </marker>
    <marker id="arwG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2e9e5b"/>
    </marker>
    <marker id="arwR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d64545"/>
    </marker>
    <marker id="arwB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2b5cad"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="660" fill="#ffffff"/>

  <text x="600" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#15161f">Continuim — autonomous emergency procurement, policy-enforced</text>
  <text x="600" y="60" text-anchor="middle" font-size="13" fill="#5b6470">the rescue is the hero · the trust layer is the tool that makes it safe · an agent may be wrong, but it cannot be unauthorized</text>

  <!-- ======== LAYER 1 · HERO RUNWAY ======== -->
  <rect x="30" y="88" width="1140" height="152" rx="12" fill="#eef4ff" stroke="#b8ccf0"/>
  <text x="52" y="110" font-size="12" font-weight="700" fill="#2b5cad">LAYER 1 · HERO RUNWAY — the autonomous rescue</text>

  <rect x="50" y="125" width="180" height="90" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="140" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#15161f">Critical supply pool</text>
  <text x="140" y="174" text-anchor="middle" font-size="11" fill="#5b6470">node failure / line stop</text>
  <text x="140" y="190" text-anchor="middle" font-size="11" fill="#5b6470">on-hand hits threshold</text>

  <rect x="280" y="125" width="190" height="90" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="375" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#15161f">Always-on monitor</text>
  <text x="375" y="174" text-anchor="middle" font-size="11" fill="#5b6470">2s check · Nexla FlexFlow</text>
  <text x="375" y="190" text-anchor="middle" font-size="11" fill="#5b6470">same versioned event</text>

  <rect x="520" y="125" width="230" height="90" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="635" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#15161f">Agent loop</text>
  <text x="635" y="174" text-anchor="middle" font-size="11" fill="#5b6470">plan · act · observe · replan</text>
  <text x="635" y="190" text-anchor="middle" font-size="11" fill="#5b6470">LLM explains, never authorizes</text>

  <rect x="980" y="125" width="180" height="90" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="1070" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#15161f">✅ Recovery PO</text>
  <text x="1070" y="174" text-anchor="middle" font-size="11" fill="#5b6470">201 accepted</text>
  <text x="1070" y="190" text-anchor="middle" font-size="11" fill="#5b6470">inbound scheduled</text>

  <line x1="230" y1="170" x2="278" y2="170" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="470" y1="170" x2="518" y2="170" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arw)"/>
  <text x="494" y="160" text-anchor="middle" font-size="10.5" fill="#2b5cad" font-weight="600">1 · stockout_risk</text>

  <!-- ======== LAYER 2 · SECONDARY GUARDRAIL ======== -->
  <rect x="30" y="298" width="1140" height="152" rx="12" fill="#fff7ea" stroke="#ecd9ad"/>
  <text x="52" y="320" font-size="12" font-weight="700" fill="#9c6510">LAYER 2 · SECONDARY GUARDRAIL — trust before spend</text>

  <rect x="50" y="335" width="220" height="95" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="160" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#15161f">Zero.xyz paid evidence 💰</text>
  <text x="160" y="382" text-anchor="middle" font-size="11" fill="#5b6470">enrichment · domain age</text>
  <text x="160" y="398" text-anchor="middle" font-size="11" fill="#5b6470">adverse media · receipts</text>

  <rect x="330" y="335" width="230" height="95" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="445" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#15161f">Deterministic policy v1.1</text>
  <text x="445" y="382" text-anchor="middle" font-size="11" fill="#5b6470">eligible · ineligible · insufficient</text>
  <text x="445" y="398" text-anchor="middle" font-size="11" fill="#d64545">payee mismatch = hard fail</text>

  <rect x="620" y="335" width="210" height="95" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="725" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#15161f">Signed capability</text>
  <text x="725" y="382" text-anchor="middle" font-size="11" fill="#5b6470">vendor · payee · quote · amount</text>
  <text x="725" y="398" text-anchor="middle" font-size="11" fill="#5b6470">evidence hash · expiry · nonce</text>

  <rect x="880" y="335" width="200" height="95" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="980" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#15161f">Pomerium gate 🛡️</text>
  <text x="980" y="382" text-anchor="middle" font-size="11" fill="#5b6470">vendor-scoped identity</text>
  <text x="980" y="398" text-anchor="middle" font-size="11" fill="#5b6470">origin re-verifies binding</text>

  <line x1="270" y1="382" x2="328" y2="382" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arw)"/>
  <text x="299" y="372" text-anchor="middle" font-size="10.5" fill="#5b6470" font-weight="600">5</text>
  <line x1="560" y1="382" x2="618" y2="382" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arw)"/>
  <text x="589" y="372" text-anchor="middle" font-size="10.5" fill="#2e9e5b" font-weight="700">eligible</text>
  <line x1="830" y1="382" x2="878" y2="382" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arw)"/>
  <text x="854" y="372" text-anchor="middle" font-size="10.5" fill="#5b6470" font-weight="600">6</text>

  <!-- cross-layer arrows -->
  <path d="M700 215 C 780 260, 880 300, 942 333" stroke="#d64545" stroke-width="2.5" fill="none" marker-end="url(#arwR)"/>
  <text x="855" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="#d64545">2 · unattested attempt</text>

  <path d="M910 333 C 830 300, 730 262, 662 218" stroke="#d64545" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arwR)"/>
  <text x="742" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#d64545">3 · 403 → replan</text>

  <path d="M560 215 C 420 260, 260 295, 178 333" stroke="#5b6470" stroke-width="2.5" fill="none" marker-end="url(#arw)"/>
  <text x="330" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#5b6470">4 · buys current evidence ($)</text>

  <path d="M1010 333 C 1030 290, 1050 255, 1062 218" stroke="#2e9e5b" stroke-width="3" fill="none" marker-end="url(#arwG)"/>
  <text x="1108" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#2e9e5b">7 · 201</text>

  <!-- ======== LAYER 3 · LEARNING ======== -->
  <rect x="30" y="490" width="1140" height="115" rx="12" fill="#eefaf1" stroke="#bfe3cb"/>
  <text x="52" y="512" font-size="12" font-weight="700" fill="#137a46">LAYER 3 · LEARNING — every incident makes the next rescue faster (never bypasses the gate)</text>

  <rect x="280" y="525" width="260" height="62" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="410" y="549" text-anchor="middle" font-size="13" font-weight="700" fill="#15161f">Incident ledger</text>
  <text x="410" y="568" text-anchor="middle" font-size="11" fill="#5b6470">append-only · vendor · spend · resolution ms</text>

  <rect x="620" y="525" width="300" height="62" rx="10" fill="#ffffff" stroke="#c4cdd9"/>
  <text x="770" y="549" text-anchor="middle" font-size="13" font-weight="700" fill="#15161f">Proven-vendor recall</text>
  <text x="770" y="568" text-anchor="middle" font-size="11" fill="#5b6470">recalled_history skips the probe · proven ranked first</text>

  <line x1="540" y1="556" x2="618" y2="556" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arw)"/>

  <line x1="430" y1="450" x2="430" y2="523" stroke="#5b6470" stroke-width="2" marker-end="url(#arw)"/>
  <text x="438" y="478" font-size="10.5" fill="#5b6470">resolved run recorded</text>

  <line x1="820" y1="523" x2="820" y2="452" stroke="#2b5cad" stroke-width="2" marker-end="url(#arwB)"/>
  <text x="828" y="478" font-size="10.5" fill="#2b5cad">informs next ranking — gate still required</text>

  <!-- footer -->
  <text x="600" y="632" text-anchor="middle" font-size="12" fill="#5b6470">Scenarios (same engine, one toggle): <tspan font-weight="700" fill="#15161f">Datacenter — DDR5 RAM spares</tspan> · <tspan font-weight="700" fill="#15161f">Apparel — navy dye</tspan></text>
  <text x="600" y="652" text-anchor="middle" font-size="11.5" fill="#5b6470">Zero.xyz — paid evidence · Pomerium — identity gate · Nexla — event ingress · StableEmail — PO delivery · Akash — hosting</text>
</svg>
