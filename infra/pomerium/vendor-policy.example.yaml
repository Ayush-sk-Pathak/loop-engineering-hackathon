# Pomerium route policy for the vendor-scoped PO route (items B1/B5).
#
# Paste this ALLOW body into the Zero route editor for the route whose "To" is
# http://procurement:4001. Everything not matched here is implicitly denied — that
# implicit deny is what turns the general agent request into the stage 403.
#
# `user.is` below is the vendor service account's REAL Pomerium User ID. In the live
# dynamic-monitor-6165 cluster that ID is "sfhack" (NOT "vendor:vendor-northstar").
# The procurement origin reconciles it to the vendor path via the env var
# POMERIUM_VENDOR_SUBJECT_ALIASES=vendor-northstar=sfhack — authorize.ts
# pomeriumSubjectsForVendor("vendor-northstar", …) => ["vendor:vendor-northstar", "sfhack"],
# and the assertion `sub` (= the User ID "sfhack") must be in that set. The URL path stays
# /po/vendor-northstar, so the signed attestation's vendor binding is unchanged.
allow:
  and:
    - user:
        is: "sfhack"
    - http_method:
        is: "POST"
    - http_path:
        is: "/po/vendor-northstar"
