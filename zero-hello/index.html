<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Continuim × Zero</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #060713;
        color: #f8fbff;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(77, 208, 255, .28), transparent 28rem),
          radial-gradient(circle at 80% 15%, rgba(167, 92, 255, .26), transparent 24rem),
          radial-gradient(circle at 50% 100%, rgba(30, 255, 171, .16), transparent 26rem),
          #060713;
      }
      .orb {
        position: fixed;
        width: 42rem;
        height: 42rem;
        border-radius: 999px;
        background: conic-gradient(from 140deg, #4dd0ff, #a75cff, #1effab, #4dd0ff);
        filter: blur(52px);
        opacity: .18;
        animation: drift 14s ease-in-out infinite alternate;
      }
      main {
        width: min(92vw, 960px);
        padding: 4rem;
        border: 1px solid rgba(255, 255, 255, .16);
        border-radius: 2rem;
        background: linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
        box-shadow: 0 24px 90px rgba(0,0,0,.48);
        backdrop-filter: blur(22px);
        text-align: center;
      }
      .eyebrow {
        display: inline-flex;
        gap: .5rem;
        align-items: center;
        padding: .45rem .8rem;
        border-radius: 999px;
        background: rgba(77, 208, 255, .12);
        color: #aeeeff;
        font-size: .82rem;
        letter-spacing: .12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 1.4rem 0 .8rem;
        font-size: clamp(3.4rem, 10vw, 8.6rem);
        line-height: .9;
        letter-spacing: -.08em;
      }
      h1 span {
        background: linear-gradient(90deg, #fff, #9fe7ff 38%, #d7bcff 70%, #b7ffd9);
        -webkit-background-clip: text;
        color: transparent;
      }
      p {
        margin: 0 auto;
        max-width: 42rem;
        color: rgba(248, 251, 255, .78);
        font-size: clamp(1.05rem, 2vw, 1.35rem);
        line-height: 1.65;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-top: 2rem;
      }
      .card {
        padding: 1rem;
        border-radius: 1.2rem;
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.12);
        color: rgba(248,251,255,.82);
      }
      .card strong { display: block; color: white; margin-bottom: .25rem; }
      @keyframes drift {
        from { transform: translate3d(-12vw, -8vh, 0) rotate(0deg) scale(.9); }
        to { transform: translate3d(12vw, 10vh, 0) rotate(35deg) scale(1.12); }
      }
      @media (max-width: 720px) {
        main { padding: 2rem; }
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="orb" aria-hidden="true"></div>
    <main>
      <div class="eyebrow">Zero-hosted hello world</div>
      <h1><span>Continuim</span></h1>
      <p>
        A policy-enforced autonomous procurement loop: detect the stockout, buy current
        evidence, enforce authority outside the agent, and schedule recovery.
      </p>
      <section class="grid" aria-label="Continuim flow">
        <div class="card"><strong>Observe</strong>Inventory risk crosses threshold.</div>
        <div class="card"><strong>Verify</strong>Zero evidence feeds policy.</div>
        <div class="card"><strong>Authorize</strong>Pomerium gates the PO.</div>
      </section>
    </main>
  </body>
</html>
